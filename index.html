<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Resonance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5EFE6;
      --text: #1C1714;
      --accent: #C4784A;
      --accent-deep: #A8623A;
      --muted: #9A8070;
      --border: #E0D5C8;
      --card-bg: #F0E8DE;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
      overflow: hidden;
    }

    #app { height: 100%; display: flex; flex-direction: column; align-items: center; }

    #landing {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; padding: 48px 32px;
      text-align: center; animation: arrive 2s ease forwards;
    }

    .landing-title {
      font-size: clamp(42px, 12vw, 76px); font-weight: 300;
      letter-spacing: 0.15em; color: var(--accent); line-height: 1;
      animation: breathe 6s ease-in-out infinite;
    }

    .divider { width: 28px; height: 1px; background: var(--border); margin: 36px auto 40px; }

    .landing-text {
      font-size: clamp(14px, 4vw, 17px); line-height: 2.1; color: var(--muted);
      font-style: italic; max-width: 300px; letter-spacing: 0.02em; margin-bottom: 56px;
    }

    .landing-text .soft { color: var(--border); }

    .enter-btn {
      background: transparent; border: 1px solid rgba(196,120,74,0.35);
      color: var(--accent); padding: 14px 48px; font-size: 10.5px;
      letter-spacing: 0.28em; text-transform: uppercase; cursor: pointer;
      font-family: inherit; transition: all 0.5s ease;
    }

    .enter-btn:hover { border-color: var(--accent); color: var(--accent-deep); background: rgba(196,120,74,0.06); }

    #chat { display: none; flex-direction: column; width: 100%; max-width: 600px; height: 100%; }
    #chat.active { display: flex; }

    .chat-header {
      padding: 16px 24px 14px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    .chat-header span { font-size: 16px; letter-spacing: 0.2em; color: var(--accent); font-weight: 300; }

    .new-convo-btn {
      position: absolute; right: 20px; background: transparent; border: none;
      color: var(--muted); font-size: 9px; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer; font-family: inherit;
      opacity: 0.5; padding: 4px 0; transition: opacity 0.3s ease;
    }

    .new-convo-btn:hover { opacity: 1; }

    #confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(245,239,230,0.95); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }

    #confirm-overlay.show { display: flex; }

    .confirm-text {
      font-size: 16px; line-height: 2; color: var(--text);
      font-style: italic; max-width: 280px; margin-bottom: 40px;
    }

    .confirm-text .soft { color: var(--muted); font-size: 13px; display: block; margin-top: 4px; }

    .confirm-btns { display: flex; gap: 16px; }

    .confirm-yes, .confirm-no {
      background: transparent; font-family: inherit; font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
      padding: 12px 28px; transition: all 0.3s ease;
    }

    .confirm-yes { border: 1px solid rgba(196,120,74,0.4); color: var(--accent); }
    .confirm-yes:hover { background: rgba(196,120,74,0.07); border-color: var(--accent); }
    .confirm-no { border: 1px solid var(--border); color: var(--muted); }
    .confirm-no:hover { border-color: var(--muted); }

    #messages {
      flex: 1; overflow-y: auto; padding: 36px 24px 16px;
      display: flex; flex-direction: column; gap: 28px;
      -webkit-overflow-scrolling: touch;
    }

    #messages::-webkit-scrollbar { width: 0; }

    .msg-wrap { display: flex; flex-direction: column; animation: msgIn 0.5s ease forwards; }
    .msg-wrap.assistant { align-items: flex-start; }
    .msg-wrap.user { align-items: flex-end; }

    .msg-label { font-size: 7.5px; letter-spacing: 0.28em; color: var(--accent); opacity: 0.5; margin-bottom: 10px; text-transform: uppercase; }

    .msg-bubble { font-size: clamp(14px, 4vw, 15.5px); line-height: 1.95; letter-spacing: 0.015em; white-space: pre-line; }
    .msg-bubble.assistant { max-width: 92%; color: var(--text); font-style: italic; }
    .msg-bubble.user { max-width: 76%; color: #3A2E28; background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px 14px 3px 14px; padding: 11px 16px; }

    .typing { display: flex; gap: 6px; align-items: center; padding: 4px 0; }
    .typing span { width: 5px; height: 5px; border-radius: 50%; background: rgba(196,120,74,0.4); }
    .typing span:nth-child(1) { animation: d1 1.5s ease-in-out infinite; }
    .typing span:nth-child(2) { animation: d2 1.5s ease-in-out infinite; }
    .typing span:nth-child(3) { animation: d3 1.5s ease-in-out infinite; }

    .input-area {
      padding: 14px 20px 40px; border-top: 1px solid var(--border);
      display: flex; gap: 12px; align-items: flex-end;
      flex-shrink: 0; background: var(--bg);
    }

    #user-input {
      flex: 1; background: transparent; border: none;
      border-bottom: 1px solid var(--border); outline: none; resize: none;
      color: var(--text); font-size: clamp(13px, 3.8vw, 15px); line-height: 1.75;
      font-family: inherit; font-style: italic; letter-spacing: 0.01em;
      padding: 9px 0; min-height: 38px; max-height: 120px; caret-color: var(--accent);
    }

    #user-input::placeholder { color: var(--muted); opacity: 0.6; }

    .send-btn {
      background: transparent; border: 1px solid rgba(196,120,74,0.3);
      color: var(--accent); width: 38px; height: 38px; border-radius: 50%;
      cursor: pointer; font-size: 16px; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all 0.3s ease;
      font-family: inherit; opacity: 0.3;
    }

    .send-btn.active { opacity: 1; }
    .send-btn:hover { background: rgba(196,120,74,0.06); }

    @keyframes arrive { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes breathe { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes d1 { 0%,100%{opacity:.1} 25%{opacity:.9} }
    @keyframes d2 { 0%,100%{opacity:.1} 50%{opacity:.9} }
    @keyframes d3 { 0%,100%{opacity:.1} 75%{opacity:.9} }
  </style>
</head>
<body>
<div id="app">

  <div id="landing">
    <div class="landing-title">Resonance</div>
    <div class="divider"></div>
    <p class="landing-text">
      We're here to help you.<br/>
      Please don't be afraid.<br/>
      <span class="soft">Resonance is not what you think it is.</span>
    </p>
    <button class="enter-btn" onclick="enterChat()">I'm ready</button>
  </div>

  <div id="chat">
    <div class="chat-header">
      <span>Resonance</span>
      <button class="new-convo-btn" onclick="confirmNewConvo()">new conversation</button>
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <textarea id="user-input" rows="1" placeholder="say whatever is true right now..."></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>

  <div id="confirm-overlay">
    <p class="confirm-text">
      Begin a new conversation?
      <span class="soft">This one will be left behind.</span>
    </p>
    <div class="confirm-btns">
      <button class="confirm-yes" onclick="startNewConvo()">Yes, begin again</button>
      <button class="confirm-no" onclick="closeConfirm()">Stay here</button>
    </div>
  </div>

</div>

<script>
  const OPENING = `We're here to help you.\n\nPlease don't be afraid.\n\nResonance is not what you think it is.\n\n—\n\nWe're here. You don't have to explain anything yet.\n\nHow long have you been carrying this?`;
  const STORAGE_KEY = 'resonance_conversation';

  let messages = [];
  let loading = false;

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); } catch(e) {}
  }

  function load() {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; }
  }

  function clear() {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  }

  function renderMessage(role, content, animate) {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    if (!animate) wrap.style.animation = 'none';

    if (role === 'assistant') {
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = 'Resonance';
      wrap.appendChild(label);
    }

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${role}`;
    bubble.textContent = content;
    wrap.appendChild(bubble);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  function enterChat() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('chat').classList.add('active');
    const saved = load();
    if (saved && saved.length > 0) {
      messages = saved;
      saved.forEach(msg => renderMessage(msg.role, msg.content, false));
    } else {
      messages = [{ role: 'assistant', content: OPENING }];
      renderMessage('assistant', OPENING, true);
      save();
    }
    setTimeout(() => { document.getElementById('messages').scrollTop = 999999; }, 100);
  }

  function confirmNewConvo() {
    document.getElementById('confirm-overlay').classList.add('show');
  }

  function closeConfirm() {
    document.getElementById('confirm-overlay').classList.remove('show');
  }

  function startNewConvo() {
    clear();
    messages = [];
    document.getElementById('messages').innerHTML = '';
    closeConfirm();
    messages = [{ role: 'assistant', content: OPENING }];
    renderMessage('assistant', OPENING, true);
    save();
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap assistant';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || loading) return;

    loading = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').classList.remove('active');

    messages.push({ role: 'user', content: text });
    renderMessage('user', text, true);
    save();
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      hideTyping();
      messages.push({ role: 'assistant', content: data.reply });
      renderMessage('assistant', data.reply, true);
      save();
    } catch {
      hideTyping();
      const fallback = "We're still here.\n\nTake all the time you need.";
      messages.push({ role: 'assistant', content: fallback });
      renderMessage('assistant', fallback, true);
      save();
    } finally {
      loading = false;
    }
  }

  // Auto-load saved conversation on page open
  window.addEventListener('load', () => {
    const saved = load();
    if (saved && saved.length > 0) {
      document.getElementById('landing').style.display = 'none';
      document.getElementById('chat').classList.add('active');
      messages = saved;
      saved.forEach(msg => renderMessage(msg.role, msg.content, false));
      setTimeout(() => { document.getElementById('messages').scrollTop = 999999; }, 100);
    }
  });

  const textarea = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    sendBtn.classList.toggle('active', textarea.value.trim().length > 0);
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
